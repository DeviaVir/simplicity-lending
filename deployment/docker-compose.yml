services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./configs/compose.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    restart: 'no'
    env_file:
      - ./configs/compose.env
    environment:
      APP_ENVIRONMENT: production
      RUN_MODE: migrate
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ./configs/compose.env
    environment:
      APP_ENVIRONMENT: production
      RUN_MODE: api
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8000/ready >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 12

  indexer:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ./configs/compose.env
    environment:
      APP_ENVIRONMENT: production
      RUN_MODE: indexer
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_ESPLORA_BASE_URL: ${VITE_ESPLORA_BASE_URL}
        VITE_NETWORK: ${VITE_NETWORK}
        VITE_WATERFALLS_URL: ${VITE_WATERFALLS_URL}
        VITE_WATERFALLS_RECIPIENT: ${VITE_WATERFALLS_RECIPIENT}
        VITE_DEBUG_MNEMONIC: ${VITE_DEBUG_MNEMONIC:-}
    restart: unless-stopped
    env_file:
      - ./configs/compose.env
    ports:
      - '${WEB_PORT}:80'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
